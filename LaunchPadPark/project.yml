name: LaunchPadPark
options:
  bundleIdPrefix: com.launchpadpark
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  LaunchPadPark:
    type: application
    platform: iOS
    sources:
      - path: LaunchPadPark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.launchpadpark.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Automatic
