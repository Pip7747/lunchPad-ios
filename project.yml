name: LaunchPad-ios
options:
  bundleIdPrefix: com.launchpad
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  LaunchPad:
    type: application
    platform: iOS
    sources:
        - path: App
        - path: Audio
        - path: Game
        - path: LaunchPad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.launchpad.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Automatic
