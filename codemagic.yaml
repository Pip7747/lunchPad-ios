workflows:
  ios-launchpadpark:
    name: LaunchPad
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "LaunchPad-ios.xcodeproj"
        XCODE_SCHEME: "LaunchPad"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
            - name: Build
        script: |
          cd $CM_BUILD_DIR
          xcodebuild build \
            -project LaunchPad-ios.xcodeproj \
            -scheme LaunchPad \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/build
      - name: Package app for Appetize
        script: |
          cd $CM_BUILD_DIR/build
          zip -r LaunchPad.zip LaunchPad.app
    artifacts:
      - build/LaunchPad.zip
    publishing:
      email:
        recipients:
          - elisihy.qian@gmail.com
