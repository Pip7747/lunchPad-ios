workflows:
  ios-launchpadpark:
    name: LaunchPad Park iOS
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "LaunchPadPark.xcodeproj"
        XCODE_SCHEME: "LaunchPadPark"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/LaunchPadPark-iOS
          xcodegen generate
      - name: Build
        script: |
          cd $CM_BUILD_DIR/LaunchPadPark-iOS
          xcodebuild build \
            -project LaunchPadPark.xcodeproj \
            -scheme LaunchPadPark \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - LaunchPadPark-iOS/build/**/*.app
    publishing:
      email:
        recipients: []
